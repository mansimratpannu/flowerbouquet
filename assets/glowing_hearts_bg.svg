<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Radial gradient for a glowing pink heart effect -->
    <radialGradient id="pinkGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="20%" stop-color="#ffb3c1" />
      <stop offset="60%" stop-color="#ff4d6d" />
      <stop offset="100%" stop-color="#c9184a" />
    </radialGradient>
    
    <!-- Y2K blurry glow filter -->
    <filter id="y2kGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Clean heart shape centered at (0,0) -->
    <path id="heartShape" d="M 0 32 C -20 12, -38 -10, -38 -28 A 18 18 0 0 1 0 -28 A 18 18 0 0 1 38 -28 C 38 -10, 20 12, 0 32 Z" />
  </defs>



  <!-- Corner Hearts (identical rotation and scale for perfect seamless tiling at grid borders) -->
  <g filter="url(#y2kGlow)" opacity="0.85" fill="url(#pinkGrad)">
    <!-- Top Left (0,0) -->
    <g transform="translate(0, 0) rotate(15) scale(1.05)">
      <use href="#heartShape" x="0" y="0" />
    </g>
    <!-- Top Right (200,0) -->
    <g transform="translate(200, 0) rotate(15) scale(1.05)">
      <use href="#heartShape" x="0" y="0" />
    </g>
    <!-- Bottom Left (0,200) -->
    <g transform="translate(0, 200) rotate(15) scale(1.05)">
      <use href="#heartShape" x="0" y="0" />
    </g>
    <!-- Bottom Right (200,200) -->
    <g transform="translate(200, 200) rotate(15) scale(1.05)">
      <use href="#heartShape" x="0" y="0" />
    </g>
  </g>

  <!-- Central Heart (different rotation and scale for organic feel) -->
  <g transform="translate(100, 100) rotate(-15) scale(0.85)" filter="url(#y2kGlow)" opacity="0.9" fill="url(#pinkGrad)">
    <use href="#heartShape" x="0" y="0" />
  </g>
</svg>
